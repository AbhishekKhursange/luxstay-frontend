server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    location /auth {
        proxy_pass http://gateway:8080;
    }

    location /user {
        proxy_pass http://gateway:8080;
    }

    location /room {
        proxy_pass http://gateway:8080;
    }

    location /booking {
        proxy_pass http://gateway:8080;
    }

    location = /payment {
        proxy_pass http://gateway:8080;
    }

    location /notify {
        proxy_pass http://gateway:8080;
    }

    location /upload {
        proxy_pass http://gateway:8080;
    }

    location /uploads {
        proxy_pass http://gateway:8080;
    }

    location ~ ^/hotel(/.*)?$ {
        proxy_pass http://gateway:8080;
    }
}